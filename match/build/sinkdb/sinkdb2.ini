#流文件存放位置配置
FlowPath=./flow/

#日志文件路径
SyslogPath=./sinkdb.log

#日志运行级别
#define LOG_NONE		0
#define LOG_EMERGENCY	1
#define LOG_CRITICAL	2
#define LOG_ERROR		3
#define LOG_WARNING		4
#define LOG_INFO		5
#define LOG_DEBUG		6
LogLevel=5

#数据库同步设置
#初始数据库的前缀
InitDB=perpetual.t_
DownDB=perpetual.t_D_

#是否同步
SinkInit=yes
SinkDown=no

##缓存时间,默认是1秒
DelaySeconds=5

