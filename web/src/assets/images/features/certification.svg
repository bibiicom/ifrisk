<svg width="72" height="72" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景光晕 -->
  <circle cx="36" cy="36" r="36" fill="url(#bgGradient)" filter="drop-shadow(0 0 12px rgba(6, 182, 212, 0.6))"/>
  <!-- 证书主体 -->
  <rect x="16" y="20" width="40" height="24" rx="4" fill="url(#cardGradient)" stroke="url(#cardStroke)" stroke-width="2" filter="drop-shadow(0 4px 8px rgba(0, 0, 0, 0.4))"/>
  <!-- 证书内容 -->
  <path d="M22 24V36" stroke="url(#lineGradient)" stroke-width="2" filter="drop-shadow(0 2px 3px rgba(0, 0, 0, 0.3))"/>
  <path d="M32 24H44" stroke="url(#lineGradient)" stroke-width="2" filter="drop-shadow(0 2px 3px rgba(0, 0, 0, 0.3))"/>
  <path d="M28 30H44" stroke="url(#lineGradient)" stroke-width="2" filter="drop-shadow(0 2px 3px rgba(0, 0, 0, 0.3))"/>
  <!-- 印章 -->
  <circle cx="46" cy="32" r="4" fill="url(#sealGradient)" stroke="url(#sealStroke)" stroke-width="2" filter="drop-shadow(0 2px 4px rgba(0, 0, 0, 0.4))"/>
  <!-- 证书高光 -->
  <rect x="18" y="22" width="6" height="12" rx="2" fill="rgba(255, 255, 255, 0.2)"/>
  <!-- 证书阴影 -->
  <rect x="16" y="20" width="40" height="24" rx="4" fill="none" stroke="rgba(0, 0, 0, 0.3)" stroke-width="1" filter="blur(2px)" transform="translate(0, 2)" opacity="0.6"/>
  <!-- 发光效果 -->
  <rect x="16" y="20" width="40" height="24" rx="4" fill="none" stroke="rgba(255, 255, 255, 0.3)" stroke-width="1" filter="blur(2px)"/>
  <!-- 高光点 -->
  <circle cx="24" cy="24" r="3" fill="url(#highlight1)" opacity="0.7"/>
  <circle cx="44" cy="38" r="2" fill="url(#highlight2)" opacity="0.6"/>
  <circle cx="28" cy="18" r="1.5" fill="url(#highlight3)" opacity="0.5"/>
  
  <defs>
    <!-- 背景渐变 -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(6, 182, 212, 0.8)"/>
      <stop offset="100%" stop-color="rgba(22, 119, 255, 0.8)"/>
    </linearGradient>
    <!-- 证书渐变 -->
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255, 255, 255, 0.2)"/>
      <stop offset="100%" stop-color="rgba(255, 255, 255, 0.05)"/>
    </linearGradient>
    <!-- 证书描边 -->
    <linearGradient id="cardStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255, 255, 255, 0.8)"/>
      <stop offset="100%" stop-color="rgba(255, 255, 255, 0.4)"/>
    </linearGradient>
    <!-- 线条渐变 -->
    <linearGradient id="lineGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#1677ff"/>
    </linearGradient>
    <!-- 印章渐变 -->
    <linearGradient id="sealGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255, 255, 255, 0.3)"/>
      <stop offset="100%" stop-color="rgba(255, 255, 255, 0.1)"/>
    </linearGradient>
    <!-- 印章描边 -->
    <linearGradient id="sealStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#1677ff"/>
    </linearGradient>
    <!-- 高光效果 -->
    <radialGradient id="highlight1" cx="0%" cy="0%" r="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="highlight2" cx="0%" cy="0%" r="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="highlight3" cx="0%" cy="0%" r="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>