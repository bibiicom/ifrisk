<svg width="72" height="72" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景光晕 -->
  <circle cx="36" cy="36" r="36" fill="url(#bgGradient)" filter="drop-shadow(0 0 12px rgba(139, 92, 246, 0.6))"/>
  <!-- 卡片主体 -->
  <rect x="16" y="20" width="40" height="24" rx="4" fill="url(#cardGradient)" stroke="url(#cardStroke)" stroke-width="2"/>
  <!-- 卡片内容 -->
  <path d="M16 28H56" stroke="url(#lineGradient)" stroke-width="2"/>
  <path d="M22 24H32" stroke="url(#lineGradient)" stroke-width="2"/>
  <!-- 芯片 -->
  <circle cx="46" cy="32" r="4" fill="url(#chipGradient)" stroke="url(#chipStroke)" stroke-width="2"/>
  <!-- 卡片高光 -->
  <rect x="18" y="22" width="8" height="12" rx="2" fill="rgba(255, 255, 255, 0.2)"/>
  <!-- 卡片阴影 -->
  <rect x="16" y="20" width="40" height="24" rx="4" fill="none" stroke="rgba(0, 0, 0, 0.3)" stroke-width="1" filter="blur(2px)" transform="translate(0, 2)" opacity="0.6"/>
  
  <defs>
    <!-- 背景渐变 -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(139, 92, 246, 0.8)"/>
      <stop offset="100%" stop-color="rgba(59, 130, 246, 0.8)"/>
    </linearGradient>
    <!-- 卡片渐变 -->
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255, 255, 255, 0.15)"/>
      <stop offset="100%" stop-color="rgba(255, 255, 255, 0.05)"/>
    </linearGradient>
    <!-- 线条渐变 -->
    <linearGradient id="lineGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(255, 255, 255, 0.8)"/>
      <stop offset="100%" stop-color="rgba(255, 255, 255, 0.4)"/>
    </linearGradient>
    <!-- 芯片渐变 -->
    <linearGradient id="chipGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255, 255, 255, 0.3)"/>
      <stop offset="100%" stop-color="rgba(255, 255, 255, 0.1)"/>
    </linearGradient>
    <!-- 卡片描边 -->
    <linearGradient id="cardStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255, 255, 255, 0.6)"/>
      <stop offset="100%" stop-color="rgba(255, 255, 255, 0.3)"/>
    </linearGradient>
    <!-- 芯片描边 -->
    <linearGradient id="chipStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255, 255, 255, 0.8)"/>
      <stop offset="100%" stop-color="rgba(255, 255, 255, 0.5)"/>
    </linearGradient>
  </defs>
</svg>